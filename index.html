<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Michael Ross | DOXA Talent</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .card {
    background: #ffffff;
    border-radius: 20px;
    max-width: 480px;
    width: 100%;
    padding: 48px 40px;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4);
    text-align: center;
  }

  .avatar {
    width: 84px;
    height: 84px;
    margin: 0 auto 24px;
    border-radius: 50%;
    background: linear-gradient(135deg, #2563eb, #7c3aed);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 32px;
    font-weight: 600;
  }

  h1 {
    font-size: 26px;
    color: #0f172a;
    margin-bottom: 6px;
  }

  .title {
    font-size: 15px;
    color: #2563eb;
    font-weight: 600;
    margin-bottom: 20px;
  }

  .divider {
    width: 40px;
    height: 3px;
    background: #2563eb;
    border-radius: 2px;
    margin: 0 auto 20px;
  }

  p.bio {
    font-size: 15px;
    line-height: 1.6;
    color: #475569;
    margin-bottom: 28px;
  }

  .contact {
    background: #f1f5f9;
    border-radius: 12px;
    padding: 18px;
    font-size: 15px;
    color: #0f172a;
    font-weight: 500;
  }

  .contact span {
    display: block;
    font-size: 13px;
    color: #64748b;
    font-weight: 400;
    margin-top: 4px;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="avatar">MR</div>
    <h1>Michael Ross</h1>
    <div class="title">Cofounder &amp; Director of Client Success, DOXA Talent</div>
    <div class="divider"></div>
    <p class="bio">
      I work with clients to build reliable, high-performing offshore teams
      and make sure the partnership keeps delivering long after day one.
    </p>
    <div class="contact">
      Want to talk about your team?
      <span>Reach out, I'd love to help.</span>
    </div>
  </div>
</body>
</html>
